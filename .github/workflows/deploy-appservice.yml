name: Deploy to Azure App Service

on:
  workflow_dispatch:

concurrency:
  group: medis-nlg-appservice
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Can be overridden using GitHub Actions Variables (Settings -> Secrets and variables -> Actions -> Variables)
      AZURE_WEBAPP_NAME_WEB: ${{ vars.AZURE_WEBAPP_NAME_WEB || 'medis-nlg-web-fpvtjrtpckvxo' }}
      AZURE_WEBAPP_NAME_PYAPI: ${{ vars.AZURE_WEBAPP_NAME_PYAPI || 'medis-nlg-pyapi-fpvtjrtpckvxo' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect optional pyapi
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "pyapi" ]; then
            echo "PYAPI_PRESENT=true" >> "$GITHUB_ENV"
            echo "pyapi folder detected"
          else
            echo "PYAPI_PRESENT=false" >> "$GITHUB_ENV"
            echo "pyapi folder not found; will skip pyapi deploy"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Create web deploy zip
        shell: bash
        run: |
          set -euo pipefail
          # Inject build stamp so we can verify the live site updated.
          SHORT_SHA="${GITHUB_SHA:0:7}"
          if grep -q "__GIT_SHA__" public/index.html; then
            sed -i "s/__GIT_SHA__/${SHORT_SHA}/g" public/index.html
          fi
          rm -f web.zip
          zip -r web.zip \
            server.js package.json package-lock.json README.md \
            public scripts Modelfile anamnesis_q.json medis_nlg.py requirements.txt START.bat START.ps1 \
            -x "**/.git/**" "**/.github/**" "**/.azure/**" "**/.venv/**" "**/node_modules/**" "pyapi/**"

      - name: Deploy web (Node)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME_WEB }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_WEB }}
          package: web.zip

      - name: Verify web deploy (homepage contains SHA)
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA:0:7}"
          URL="https://${AZURE_WEBAPP_NAME_WEB}.azurewebsites.net/"
          echo "Checking $URL contains injected UI_BUILD $SHORT_SHA"
          for i in {1..20}; do
            BODY="$(curl -fsSL "$URL" | tr -d '\r' || true)"
            if echo "$BODY" | grep -q "const UI_BUILD = '${SHORT_SHA}'"; then
              echo "OK: build stamp found"
              exit 0
            fi
            echo "Not yet updated (attempt $i/20). Waiting..."
            sleep 5
          done
          echo "ERROR: build stamp not found after waiting."
          exit 1

      - name: Deploy pyapi (Python)
        if: env.PYAPI_PRESENT == 'true' && secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PYAPI != ''
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME_PYAPI }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PYAPI }}
          package: pyapi

      - name: Skip pyapi deploy (missing folder/secret)
        if: env.PYAPI_PRESENT != 'true' || secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PYAPI == ''
        shell: bash
        run: |
          echo "Skipping pyapi deploy. PYAPI_PRESENT=${PYAPI_PRESENT}."
          if [ "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PYAPI }}" = "" ]; then
            echo "Reason: secret AZURE_WEBAPP_PUBLISH_PROFILE_PYAPI is not set."
          fi
